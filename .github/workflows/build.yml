name: Automated Test Build

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      ocgcore-url: ${{ steps.parse-pr-override.outputs.ocgcore-url }}
      ocgcore-branch: ${{ steps.parse-pr-override.outputs.ocgcore-branch }}

    steps:
    - name: Parse pull request description for dependency overrides
      id: parse-pr-override
      env:
        PR_BODY: ${{ github.event.pull_request.body }}
      shell: python
      run: |
        # You can override the URLs and branches of dependencies by adding lines in the pull request description.
        # This is useful when you want to test changes which require modifications in the submodules or dependencies.
        # Expected description format:
        # > name: owner/repo@branch
        # (leading >, dependency name, followed by GitHub repository, optional branch)
        # Example:
        # > ocgcore: mercury233/ygopro-core@patch-branch
        # Supported dependencies:
        # ocgcore, irrlicht
        import re, os
        body = os.environ.get('PR_BODY', '')
        # Default URLs and branches for dependencies
        ocgcore_url = 'https://github.com/Fluorohydride/ygopro-core'
        ocgcore_branch = ''
        irrlicht_url = 'https://github.com/mercury233/irrlicht'
        irrlicht_branch = ''
        # Regex patterns for parsing:
        # REPO_RE: matches format "owner/repo" (e.g., "user/repo-name")
        # BRANCH_RE: matches branch names with dots, slashes, and hyphens (e.g., "feature/my-branch", "v1.0")
        REPO_RE = r'[\w][\w.-]*/[\w][\w.-]*'
        BRANCH_RE = r'[\w][\w./-]*'
        m = re.search(rf'(?m)^\s*>\s*ocgcore\s*:\s*({REPO_RE})(?:@({BRANCH_RE}))?\s*$', body)
        if m:
            ocgcore_url = f'https://github.com/{m.group(1)}'
            if m.group(2):
                ocgcore_branch = m.group(2)
        m = re.search(rf'(?m)^\s*>\s*irrlicht\s*:\s*({REPO_RE})(?:@({BRANCH_RE}))?\s*$', body)
        if m:
            irrlicht_url = f'https://github.com/{m.group(1)}'
            if m.group(2):
                irrlicht_branch = m.group(2)
        # Output the parsed URLs and branches for downstream jobs
        with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
            f.write(f'ocgcore-url={ocgcore_url}\n')
            f.write(f'ocgcore-branch={ocgcore_branch}\n')
            f.write(f'irrlicht-url={irrlicht_url}\n')
            f.write(f'irrlicht-branch={irrlicht_branch}\n')

    - name: Download irrlicht
      run: |
        branch="${{ steps.parse-pr-override.outputs.irrlicht-branch }}"
        if [ -n "$branch" ]; then
          git clone --depth=1 -b "$branch" ${{ steps.parse-pr-override.outputs.irrlicht-url }} irrlicht
        else
          git clone --depth=1 ${{ steps.parse-pr-override.outputs.irrlicht-url }} irrlicht
        fi

    - name: Download lua
      id: lua
      uses: mercury233/action-cache-download-file@v1.0.0
      with:
        url: https://www.lua.org/ftp/lua-5.4.8.tar.gz

    - name: Extract lua
      run: |
        tar xf ${{ steps.lua.outputs.filepath }}
        mv lua-5.4.8 lua

    - name: Download miniaudio
      run: |
        git clone --depth=1 -b 0.11.25 https://github.com/mackron/miniaudio
        cd miniaudio
        cp extras/miniaudio_split/miniaudio.* .
        cd ..

    - name: Upload sources
      uses: actions/upload-artifact@v4
      with:
        name: dependencies-sources
        path: |
          lua/
          miniaudio/
          irrlicht/

  prepare-static-dependencies:
    runs-on: ubuntu-latest

    steps:
    - name: Download libevent
      id: libevent
      uses: mercury233/action-cache-download-file@v1.0.0
      with:
        url: https://github.com/libevent/libevent/releases/download/release-2.1.12-stable/libevent-2.1.12-stable.tar.gz
        filename: libevent.tar.gz

    - name: Extract libevent
      run: |
        tar xf ${{ steps.libevent.outputs.filepath }}
        mv libevent-2.1.12-stable event

    - name: Download freetype
      id: freetype
      uses: mercury233/action-cache-download-file@v1.0.0
      with:
        url: https://downloads.sourceforge.net/freetype/freetype-2.14.2.tar.gz

    - name: Extract freetype
      run: |
        tar xf ${{ steps.freetype.outputs.filepath }}
        mv freetype-2.14.2 freetype

    - name: Download sqlite
      id: sqlite
      uses: mercury233/action-cache-download-file@v1.0.0
      with:
        url: https://www.sqlite.org/2026/sqlite-amalgamation-3510300.zip

    - name: Extract sqlite
      run: |
        7z x ${{ steps.sqlite.outputs.filepath }}
        mv sqlite-amalgamation-3510300 sqlite3

    - name: Create miniaudio external directory
      run: |
        mkdir -p miniaudio/external

    - name: Download ogg
      id: ogg
      uses: mercury233/action-cache-download-file@v1.0.0
      with:
        url: https://github.com/xiph/ogg/releases/download/v1.3.6/libogg-1.3.6.tar.gz

    - name: Extract ogg
      run: |
        tar xf ${{ steps.ogg.outputs.filepath }}
        mv libogg-1.3.6 miniaudio/external/ogg

    - name: Download opus
      id: opus
      uses: mercury233/action-cache-download-file@v1.0.0
      with:
        url: https://github.com/xiph/opus/releases/download/v1.5.2/opus-1.5.2.tar.gz

    - name: Extract opus
      run: |
        tar xf ${{ steps.opus.outputs.filepath }}
        mv opus-1.5.2 miniaudio/external/opus

    - name: Download opusfile
      id: opusfile
      uses: mercury233/action-cache-download-file@v1.0.0
      with:
        url: https://github.com/xiph/opusfile/releases/download/v0.12/opusfile-0.12.tar.gz

    - name: Extract opusfile
      run: |
        tar xf ${{ steps.opusfile.outputs.filepath }}
        mv opusfile-0.12 miniaudio/external/opusfile

    - name: Download vorbis
      id: vorbis
      uses: mercury233/action-cache-download-file@v1.0.0
      with:
        url: https://github.com/xiph/vorbis/releases/download/v1.3.7/libvorbis-1.3.7.tar.gz

    - name: Extract vorbis
      run: |
        tar xf ${{ steps.vorbis.outputs.filepath }}
        mv libvorbis-1.3.7 miniaudio/external/vorbis

    - name: Upload static dependencies
      uses: actions/upload-artifact@v4
      with:
        name: dependencies-sources-static-link
        path: |
          event/
          freetype/
          sqlite3/
          miniaudio/
          !miniaudio/external/opus/dnn/

  build-windows:
    needs: [prepare, prepare-static-dependencies]
    strategy:
      fail-fast: false
      matrix:
        name:
          - windows
#          - windows-irrklang
#          - windows-no-dxsdk
          - windows-x64
#          - windows-2025
        include:
          - name: windows
            os: windows-2022
            vs: vs2022
            audiolib: miniaudio
#          - name: windows-irrklang
#            os: windows-2022
#            vs: vs2022
#            audiolib: irrklang
#          - name: windows-no-dxsdk
#            os: windows-2022
#            vs: vs2022
#            audiolib: miniaudio
#            nodxsdk: true
          - name: windows-x64
            os: windows-2022
            vs: vs2022
            audiolib: miniaudio
            x64: true
#          - name: windows-2025
#            os: windows-2025
#            vs: vs2025 # to be enabled after the release of Visual Studio 2025
#            audiolib: miniaudio

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: false

    - name: Update submodules
      # Here we use override URLs and branches from the prepare job, which can be set by pull request description,
      # to make sure we are testing the correct code. Only the ocgcore submodule is required for the build.
      shell: bash
      run: |
        git submodule update --init --no-fetch ocgcore
        cd ocgcore
        git fetch --depth=1 ${{ needs.prepare.outputs.ocgcore-url }} ${{ needs.prepare.outputs.ocgcore-branch }}
        git checkout FETCH_HEAD
        cd ..
#        cd script
#        git checkout master
#        git pull origin master
#        cd ..

    - name: Download prepare sources
      uses: actions/download-artifact@v4
      with:
        name: dependencies-sources
        path: .

    - name: Download static dependencies sources
      uses: actions/download-artifact@v4
      with:
        name: dependencies-sources-static-link
        path: .

    - name: Download premake
      id: premake
      uses: mercury233/action-cache-download-file@v1.0.0
      with:
        url: https://github.com/premake/premake-core/releases/download/v5.0.0-beta7/premake-5.0.0-beta7-windows.zip
        filename: premake5.zip

    - name: Extract premake
      shell: bash
      run: |
        7z x ${{ steps.premake.outputs.filepath }}

    - name: Download irrKlang
      if: matrix.audiolib == 'irrklang'
      id: irrKlang
      uses: mercury233/action-cache-download-file@v1.0.0
      with:
        url: https://www.ambiera.at/downloads/irrKlang-32bit-1.6.0.zip

    - name: Extract irrKlang
      if: matrix.audiolib == 'irrklang'
      shell: bash
      run: |
        7z x ${{ steps.irrKlang.outputs.filepath }}
        mv irrKlang-1.6.0 irrKlang

    - name: Check DirectX SDK
      if: matrix.nodxsdk != true
      id: dxsdk
      uses: actions/cache@v4
      with:
        key: dxsdk
        path: DXSDK

    - name: Download DirectX SDK
      if: matrix.nodxsdk != true && steps.dxsdk.outputs.cache-hit != 'true'
      id: dxsdk-download
      uses: mercury233/action-cache-download-file@v1.0.0
      with:
        url: https://download.microsoft.com/download/a/e/7/ae743f1f-632b-4809-87a9-aa1bb3458e31/DXSDK_Jun10.exe

    - name: Install DirectX SDK
      if: matrix.nodxsdk != true && steps.dxsdk.outputs.cache-hit != 'true'
      shell: bash
      run: |
        7z x ${{ steps.dxsdk-download.outputs.filepath }} -aoa

    - name: Set DirectX SDK environment variable
      if: matrix.nodxsdk != true
      shell: pwsh
      run: |
        $dxsdkPath = Resolve-Path 'DXSDK'
        "DXSDK_DIR=$($dxsdkPath.ProviderPath)\" | Out-File -FilePath $env:GITHUB_ENV -Append

    - name: Copy premake files
      shell: bash
      run: |
        cp -pr premake/* .
        cp -pr resource/* .

    - name: Use premake to generate Visual Studio solution
      shell: pwsh
      run: |
        .\premake5.exe ${{ matrix.vs }} --audio-lib=${{ matrix.audiolib }}

    - name: Add msbuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Build solution
      shell: pwsh
      run: |
        MSBuild.exe build\YGOPro.sln /m /p:Configuration=Release /p:Platform=${{ matrix.x64 && 'x64' || 'Win32' }}

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: YGOPro-${{ matrix.name }}
        path: |
          bin/release/x86/YGOPro.exe
          bin/release/x64/YGOPro.exe

  build-linux:
    needs: [prepare, prepare-static-dependencies]
    strategy:
      fail-fast: false
      matrix:
        name:
          - ubuntu-22
          - ubuntu-24
          - ubuntu-static-link
        include:
          - name: ubuntu-22
            os: ubuntu-22.04
            premake-version: 5.0.0-beta4
          - name: ubuntu-24
            os: ubuntu-24.04
            premake-version: 5.0.0-beta7
          - name: ubuntu-static-link
            os: ubuntu-22.04
            premake-version: 5.0.0-beta4
            static-link: true

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: false

    - name: Update submodules
      run: |
        git submodule update --init --no-fetch ocgcore
        cd ocgcore
        git fetch --depth=1 ${{ needs.prepare.outputs.ocgcore-url }} ${{ needs.prepare.outputs.ocgcore-branch }}
        git checkout FETCH_HEAD
        cd ..
#        cd script
#        git checkout master
#        git pull origin master
#        cd ..

    - name: Download prepare sources
      uses: actions/download-artifact@v4
      with:
        name: dependencies-sources
        path: .

    - name: Download static dependencies sources
      if: matrix.static-link == true
      uses: actions/download-artifact@v4
      with:
        name: dependencies-sources-static-link
        path: .

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1-mesa-dev libglu1-mesa-dev libxxf86vm-dev

    - name: Install dependencies (dynamic link)
      if: matrix.static-link != true
      run: |
        sudo apt-get install -y libevent-dev libfreetype6-dev libsqlite3-dev libopusfile-dev libvorbis-dev

    - name: Download premake
      id: premake
      uses: mercury233/action-cache-download-file@v1.0.0
      with:
        url: https://github.com/premake/premake-core/releases/download/v${{ matrix.premake-version }}/premake-${{ matrix.premake-version }}-linux.tar.gz
        filename: premake5.tar.gz

    - name: Extract premake
      run: |
        tar xf ${{ steps.premake.outputs.filepath }}
        chmod +x ./premake5

    - name: Configure libevent
      if: matrix.static-link == true
      run: |
        cd event
        chmod +x configure build-aux/*
        ./configure --disable-openssl --enable-static=yes --enable-shared=no
        sed -f make-event-config.sed < config.h > ./include/event2/event-config.h
        cd ..

    - name: Configure ogg
      if: matrix.static-link == true
      run: |
        cd miniaudio/external/ogg
        chmod +x configure
        ./configure
        cd ../../..

    - name: Copy premake files
      run: |
        cp -pr premake/* .
        cp -pr resource/* .

    - name: Use premake to generate make files (apt packages)
      if: matrix.static-link != true
      run: |
        ./premake5 gmake

    - name: Use premake to generate make files (static link)
      if: matrix.static-link == true
      run: |
        ./premake5 gmake \
          --build-event \
          --build-freetype \
          --build-sqlite \
          --build-opus-vorbis

    - name: Make
      run: |
        cd build
        make -j 4 config=release
        cd ..

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: YGOPro-${{ matrix.name }}
        path: |
          bin/release/YGOPro

  build-macos:
    needs: [prepare, prepare-static-dependencies]
    strategy:
      fail-fast: false
      matrix:
        name:
          - macos-15-intel
          - macos-15-universal-static-link
          - macos-15-arm
#          - macos-15-intel-cross-compile-static-link
        include:
          - name: macos-15-intel
            os: macos-15-intel
          - name: macos-15-universal-static-link
            os: macos-15
            cross-build-intel: true
            cross-build-arm: true
            static-link: true
          - name: macos-15-arm
            os: macos-15
#          - name: macos-15-intel-cross-compile-static-link
#            os: macos-15
#            cross-build-intel: true
#            static-link: true

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: false

    - name: Update submodules
      run: |
        git submodule update --init --no-fetch ocgcore
        cd ocgcore
        git fetch --depth=1 ${{ needs.prepare.outputs.ocgcore-url }} ${{ needs.prepare.outputs.ocgcore-branch }}
        git checkout FETCH_HEAD
        cd ..
#        cd script
#        git checkout master
#        git pull origin master
#        cd ..

    - name: Download prepare sources
      uses: actions/download-artifact@v4
      with:
        name: dependencies-sources
        path: .

    - name: Download static dependencies sources
      if: matrix.static-link == true
      uses: actions/download-artifact@v4
      with:
        name: dependencies-sources-static-link
        path: .

    - name: Install dependencies
      if: matrix.static-link != true
      run: |
        brew install opus opusfile libvorbis
#        brew install sqlite libx11 freetype libevent

    - name: Download premake
      id: premake
      uses: mercury233/action-cache-download-file@v1.0.0
      with:
        url: https://github.com/premake/premake-core/releases/download/v5.0.0-beta7/premake-5.0.0-beta7-macosx.tar.gz
        filename: premake5.tar.gz

    - name: Extract premake
      run: |
        tar xf ${{ steps.premake.outputs.filepath }}
        chmod +x ./premake5

    - name: Configure libevent
      if: matrix.static-link == true
      run: |
        cd event
        chmod +x configure build-aux/*
        ./configure --disable-openssl --enable-static=yes --enable-shared=no
        sed -f make-event-config.sed < config.h > ./include/event2/event-config.h
        cd ..

    - name: Copy premake files
      run: |
        cp -pr premake/* .
        cp -pr resource/* .

    - name: Use premake to generate make files (Homebrew packages)
      if: matrix.static-link != true
      run: |
        DYLD_LIBRARY_PATH=$(brew --prefix)/lib ./premake5 gmake

    - name: Use premake to generate make files (static link)
      if: matrix.static-link == true
      run: |
        ./premake5 gmake ${{ matrix.cross-build-intel == true && '--mac-intel' || '' }} ${{ matrix.cross-build-arm == true && '--mac-arm' || '' }} \
          --build-event \
          --build-freetype \
          --build-sqlite \
          --build-opus-vorbis

    - name: Make
      run: |
        cd build
        make -j 3 config=release
        cd ..

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: YGOPro-${{ matrix.name }}
        path: |
          bin/release/YGOPro
